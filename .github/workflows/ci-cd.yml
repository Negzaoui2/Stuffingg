name: CI/CD Stuffing (monorepo)

# Declencheurs : a chaque push ou pull request sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permissions necessaires pour pousser les images vers GHCR
permissions:
  contents: read
  packages: write

jobs:

  # ============================================================
  # 1) DETECTER QUELS DOSSIERS ONT CHANGE
  #    Ce job calcule des "drapeaux" (true/false) par service,
  #    pour ne (re)construire que ce qui a change.
  # ============================================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      chatbot: ${{ steps.filter.outputs.chatbot }}
      optimisation: ${{ steps.filter.outputs.optimisation }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backendSpringg/**'
            frontend:
              - 'frontendAngular/**'
            chatbot:
              - 'chatbotMicros/**'
            optimisation:
              - 'OptimsationMicros/**'

  # ============================================================
  # 2) BACKEND SPRING BOOT (Maven + tests + image Docker)
  # ============================================================
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build et tests Maven
        working-directory: ./backendSpringg
        run: mvn -B verify

      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backendSpringg
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest

  # ============================================================
  # 3) FRONTEND ANGULAR (npm build + image Docker)
  # ============================================================
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontendAngular/package-lock.json

      - name: Installer les dependances
        working-directory: ./frontendAngular
        run: npm ci

      - name: Build Angular
        working-directory: ./frontendAngular
        run: npm run build

      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontendAngular
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest

  # ============================================================
  # 4) CHATBOT (Python FastAPI + image Docker)
  # ============================================================
  chatbot:
    needs: changes
    if: ${{ needs.changes.outputs.chatbot == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer les dependances
        working-directory: ./chatbotMicros
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verification de la compilation
        working-directory: ./chatbotMicros
        run: python -m compileall .

      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image chatbot
        uses: docker/build-push-action@v6
        with:
          context: ./chatbotMicros
          push: true
          tags: ghcr.io/${{ github.repository }}/chatbot:latest

  # ============================================================
  # 5) OPTIMISATION (Python OR-Tools + image Docker)
  # ============================================================
  optimisation:
    needs: changes
    if: ${{ needs.changes.outputs.optimisation == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer les dependances
        working-directory: ./OptimsationMicros
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verification de la compilation
        working-directory: ./OptimsationMicros
        run: python -m compileall .

      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image optimisation
        uses: docker/build-push-action@v6
        with:
          context: ./OptimsationMicros
          push: true
          tags: ghcr.io/${{ github.repository }}/optimisation:latest
