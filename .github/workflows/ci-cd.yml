name: CI/CD Stuffing (monorepo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      chatbot: ${{ steps.filter.outputs.chatbot }}
      optimisation: ${{ steps.filter.outputs.optimisation }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backendSpringg/**'
            frontend:
              - 'frontendAngular/**'
            chatbot:
              - 'chatbotMicros/**'
            optimisation:
              - 'OptimsationMicros/**'

  # ================= BACKEND =================
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image en minuscules (obligatoire GHCR)
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Installer JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build et tests Maven
        working-directory: ./backendSpringg
        run: mvn -B verify

      - name: Connexion a GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backendSpringg
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_REPO }}/backend:latest

  # ================= FRONTEND =================
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image en minuscules (obligatoire GHCR)
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontendAngular/package-lock.json

      - name: Installer les dependances
        working-directory: ./frontendAngular
        run: npm ci

      - name: Build Angular
        working-directory: ./frontendAngular
        run: npm run build

      - name: Connexion a GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontendAngular
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_REPO }}/frontend:latest

  # ================= CHATBOT =================
  chatbot:
    needs: changes
    if: ${{ needs.changes.outputs.chatbot == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image en minuscules (obligatoire GHCR)
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer les dependances
        working-directory: ./chatbotMicros
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verification de la compilation
        working-directory: ./chatbotMicros
        run: python -m compileall .

      - name: Connexion a GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image chatbot
        uses: docker/build-push-action@v6
        with:
          context: ./chatbotMicros
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_REPO }}/chatbot:latest

  # ================= OPTIMISATION =================
  optimisation:
    needs: changes
    if: ${{ needs.changes.outputs.optimisation == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image en minuscules (obligatoire GHCR)
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer les dependances
        working-directory: ./OptimsationMicros
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verification de la compilation
        working-directory: ./OptimsationMicros
        run: python -m compileall .

      - name: Connexion a GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push image optimisation
        uses: docker/build-push-action@v6
        with:
          context: ./OptimsationMicros
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_REPO }}/optimisation:latest
